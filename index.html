<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="prev-display"></div>
            <div class="current-operand" id="curr-display">0</div>
        </div>

        <div class="buttons">
            <button class="btn action-btn" data-action="clear">AC</button>
            <button class="btn action-btn" data-action="delete">DEL</button>
            <button class="btn operator-btn" data-operator="%">%</button>
            <button class="btn operator-btn" data-operator="/">÷</button>

            <button class="btn number-btn">7</button>
            <button class="btn number-btn">8</button>
            <button class="btn number-btn">9</button>
            <button class="btn operator-btn" data-operator="*">&times;</button>

            <button class="btn number-btn">4</button>
            <button class="btn number-btn">5</button>
            <button class="btn number-btn">6</button>
            <button class="btn operator-btn" data-operator="-">&minus;</button>

            <button class="btn number-btn">1</button>
            <button class="btn number-btn">2</button>
            <button class="btn number-btn">3</button>
            <button class="btn operator-btn" data-operator="+">+</button>

            <button class="btn number-btn zero">0</button>
            <button class="btn number-btn">.</button>
            <button class="btn equal-btn" id="equals">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
